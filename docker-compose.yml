services:
  audioserver:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/data/audioserver.db
      - MUSIC_LIBRARY_PATHS=/music
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    volumes:
      - audioserver-data:/data
      - ${MUSIC_PATH:-/mnt/music}:/music:ro
    restart: unless-stopped

volumes:
  audioserver-data:
