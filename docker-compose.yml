services:
  audioserver:
    build: .
    # No ports: needed with network_mode: host (container uses host network directly)
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_PATH=/data/audioserver.db
      - MUSIC_LIBRARY_PATHS=/music
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - TIDAL_CLIENT_ID=${TIDAL_CLIENT_ID:-}
      - TIDAL_CLIENT_SECRET=${TIDAL_CLIENT_SECRET:-}
      - QOBUZ_USERNAME=${QOBUZ_USERNAME:-}
      - QOBUZ_PASSWORD=${QOBUZ_PASSWORD:-}
      - DLNA_DEVICES=${DLNA_DEVICES:-}
      - VOLUMIO_DEVICES=${VOLUMIO_DEVICES:-}
      - SPOTIFY_USERNAME=${SPOTIFY_USERNAME:-}
      - SPOTIFY_PASSWORD=${SPOTIFY_PASSWORD:-}
    volumes:
      - audioserver-data:/data
      # On Synology: /volume1/music is the typical path for a "music" shared folder
      - ${MUSIC_PATH:-/volume1/music}:/music:ro
    network_mode: host  # Required for DLNA/SSDP multicast discovery
    restart: unless-stopped

volumes:
  audioserver-data:
